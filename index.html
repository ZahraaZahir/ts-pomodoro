<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomodoro Timer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <script type="module" src="./app.ts"></script>

    <div id="auth-section">
      <div class="timer-container">
        <h1>Pomodoro Timer</h1>
        <div class="auth-tabs">
          <button id="login-tab" class="auth-tab active">Login</button>
          <button id="register-tab" class="auth-tab">Register</button>
        </div>

        <form id="login-form">
          <input type="email" placeholder="Email" required />
          <input type="password" placeholder="Password" minlength="6" required />
          <button type="submit">Login</button>
        </form>

        <form id="register-form" class="hidden">
          <input type="email" placeholder="Email" required />
          <input type="password" placeholder="Password" minlength="6" required />
          <button type="submit">Register</button>
        </form>

        <p id="auth-error" class="error hidden"></p>
      </div>
    </div>

    <div id="timer-section" class="hidden">
      <div class="timer-container">
        <div class="header-row">
          <h1>Pomodoro Timer</h1>
          <button id="logout-btn" class="logout-btn">Logout</button>
        </div>
        <div class="modes">
          <button id="pomodoro-btn" class="mode-button active">Pomodoro</button>
          <button id="short-break-btn" class="mode-button">Short Break</button>
          <button id="long-break-btn" class="mode-button">Long Break</button>
        </div>

        <div id="time-display">25:00</div>

        <div class="controls">
          <button id="start-btn">Start</button>
          <button id="pause-btn" class="hidden">Pause</button>
          <button id="reset-btn">Reset</button>
        </div>
      </div>

      <div class="timer-container sessions-container">
        <h2>Session History</h2>
        <div id="sessions-list">
          <p class="empty-state">No sessions yet. Start your first Pomodoro!</p>
        </div>
      </div>
    </div>
  </body>
</html>
